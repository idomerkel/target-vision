<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Target Hub - Noise Gate Build</title>
    <script>
        var Module = { onRuntimeInitialized: function() { onOpenCvReady(); } };
    </script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; width: 100vw; overflow: hidden; }
        .video-box { position: absolute; top: 0; left: 0; width: 100%; height: 50%; background: #111; z-index: 1; }
        video#webcam { width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); }
        canvas.overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transform: scaleX(-1); }
        .bottom-ui { position: fixed; bottom: 0; left: 0; width: 100%; height: 50%; background: #1a1a1a; z-index: 999; border-top: 2px solid #ff3b30; padding: 10px; display: flex; flex-direction: column; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: auto; padding-bottom: 25px; }
        button { padding: 22px; border: none; border-radius: 12px; background: #ff3b30; color: #fff; font-weight: bold; font-size: 14px; }
        button#btnTrack.active { background: #555 !important; }
        button:disabled { background: #333; color: #666; }
        #status { color: #00ff00; font-size: 12px; text-align: center; font-family: monospace; margin-bottom: 5px; }
        #shotList { flex: 1; overflow-y: auto; font-size: 11px; background: #000; padding: 8px; border: 1px solid #333; color: #0f0; font-family: monospace; }
        #debugCanvas { width: 120px; height: 90px; border: 1px solid #444; background: #000; margin: 0 auto 5px auto; display: block; }
    </style>
</head>
<body>

    <div class="video-box">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlayCanvas" class="overlay"></canvas>
    </div>

    <div class="bottom-ui">
        <div id="status">INIT...</div>
        <canvas id="debugCanvas"></canvas>
        <div id="shotList">CONSOLE: WAITING FOR LOCK</div>
        <div class="btn-row">
            <button id="btnBase" onclick="setBaseline()" disabled>LOCK TARGET</button>
            <button id="btnTrack" onclick="toggleTracking()" disabled>START SESSION</button>
        </div>
    </div>

    <canvas id="calcCanvas" style="display:none;"></canvas>

<script>
    let isTracking = false;
    let orb = null, matcher = null, refKP = null, refDesc = null, refGray = null;
    let persistentShots = [], candidates = [];
    const MATH_SCALE = 0.5;

    function onOpenCvReady() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 640, height: 480 } })
        .then(s => {
            const v = document.getElementById('webcam');
            v.srcObject = s;
            v.onloadedmetadata = () => {
                const ov = document.getElementById('overlayCanvas');
                ov.width = v.videoWidth; ov.height = v.videoHeight;
                document.getElementById('btnBase').disabled = false;
                document.getElementById('status').innerText = "CAMERA ONLINE";
            };
        });
    }

    function grab() {
        const v = document.getElementById('webcam');
        const cvs = document.getElementById('calcCanvas');
        cvs.width = v.videoWidth * MATH_SCALE; cvs.height = v.videoHeight * MATH_SCALE;
        const ctx = cvs.getContext('2d');
        ctx.save(); ctx.scale(-MATH_SCALE, MATH_SCALE);
        ctx.drawImage(v, -v.videoWidth, 0, v.videoWidth, v.videoHeight);
        ctx.restore();
        return cv.imread(cvs);
    }

    function setBaseline() {
        try {
            if(!orb) { orb = new cv.ORB(500); matcher = new cv.BFMatcher(cv.NORM_HAMMING, true); refKP = new cv.KeyPointVector(); refDesc = new cv.Mat(); }
            let frame = grab();
            let gray = new cv.Mat(), thresh = new cv.Mat();
            cv.cvtColor(frame, gray, cv.COLOR_RGBA2GRAY);
            cv.equalizeHist(gray, gray);
            cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);
            cv.imshow('debugCanvas', thresh);
            let contours = new cv.MatVector(), hierarchy = new cv.Mat();
            cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
            let best = null, maxA = 0;
            for(let i=0; i<contours.size(); i++) {
                let a = cv.contourArea(contours.get(i));
                if(a > 200 && a > maxA) { maxA = a; best = cv.minEnclosingCircle(contours.get(i)); }
            }
            if(!best) { document.getElementById('status').innerText = "LOCK FAILED"; return; }
            let radius = Math.round(best.radius);
            let rect = new cv.Rect(Math.max(0, best.center.x - radius - 20), Math.max(0, best.center.y - radius - 20), Math.min(frame.cols - (best.center.x - radius - 20), (radius*2)+40), Math.min(frame.rows - (best.center.y - radius - 20), (radius*2)+40));
            if(refGray) refGray.delete();
            refGray = gray.roi(rect).clone();
            orb.detectAndCompute(refGray, new cv.Mat(), refKP, refDesc);
            document.getElementById('btnTrack').disabled = false;
            document.getElementById('status').innerText = "LOCKED - TAP START";
            frame.delete(); gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete();
        } catch(e) { console.error(e); }
    }

    function trackingLoop() {
        if(!isTracking) return;

        let frame = grab();
        let grayLive = new cv.Mat(), liveKP = new cv.KeyPointVector(), liveDesc = new cv.Mat(), matches = new cv.DMatchVector();
        
        try {
            cv.cvtColor(frame, grayLive, cv.COLOR_RGBA2GRAY);
            cv.equalizeHist(grayLive, grayLive);
            orb.detectAndCompute(grayLive, new cv.Mat(), liveKP, liveDesc);

            if(!liveDesc.empty()) {
                matcher.match(refDesc, liveDesc, matches);
                let good = [];
                for(let i=0; i<matches.size(); i++) { if(matches.get(i).distance < 45) good.push(matches.get(i)); }
                
                if(good.length >= 8) {
                    let srcP = [], dstP = [];
                    for(let m of good) { srcP.push(refKP.get(m.queryIdx).pt.x, refKP.get(m.queryIdx).pt.y); dstP.push(liveKP.get(m.trainIdx).pt.x, liveKP.get(m.trainIdx).pt.y); }
                    let matSrc = cv.matFromArray(good.length, 1, cv.CV_32FC2, srcP), matDst = cv.matFromArray(good.length, 1, cv.CV_32FC2, dstP);
                    let H = cv.findHomography(matSrc, matDst, cv.RANSAC, 5.0);
                    
                    if(!H.empty()) {
                        let invH = new cv.Mat(); cv.invert(H, invH, cv.DECOMP_LU);
                        let warped = new cv.Mat(); cv.warpPerspective(grayLive, warped, invH, new cv.Size(refGray.cols, refGray.rows));
                        let diff = new cv.Mat(), thresh = new cv.Mat();
                        cv.absdiff(refGray, warped, diff);
                        
                        // NOISE GATE: Median blur removes "salt and pepper" static
                        cv.medianBlur(diff, diff, 3);
                        cv.threshold(diff, thresh, 65, 255, cv.THRESH_BINARY);
                        
                        // MORPHOLOGY: Erase tiny noise specks
                        let M = cv.Mat.ones(2, 2, cv.CV_8U);
                        cv.morphologyEx(thresh, thresh, cv.MORPH_OPEN, M);
                        cv.imshow('debugCanvas', thresh);
                        
                        let contours = new cv.MatVector(), hier = new cv.Mat();
                        cv.findContours(thresh, contours, hier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                        let holes = [];
                        for(let i=0; i<contours.size(); i++) {
                            let area = cv.contourArea(contours.get(i));
                            if(area > 6 && area < 100) {
                                let Mm = cv.moments(contours.get(i));
                                holes.push({x: Mm.m10/Mm.m00, y: Mm.m01/Mm.m00});
                            }
                        }
                        processShots(holes);
                        drawOverlay(H);
                        
                        invH.delete(); warped.delete(); diff.delete(); thresh.delete(); contours.delete(); hier.delete(); H.delete(); M.delete();
                    }
                    matSrc.delete(); matDst.delete();
                }
            }
        } catch(e) { console.warn(e); } finally {
            frame.delete(); grayLive.delete(); liveKP.delete(); liveDesc.delete(); matches.delete();
        }
        setTimeout(trackingLoop, 40);
    }

    function processShots(holes) {
        for(let h of holes) {
            if(persistentShots.some(s => Math.hypot(s.x-h.x, s.y-h.y) < 12)) continue;
            let c = candidates.find(can => Math.hypot(can.x-h.x, can.y-h.y) < 12);
            if(c) { 
                c.f++; 
                if(c.f >= 5) { // Consensus filter: see it 5 times in a row
                    persistentShots.push({x:h.x, y:h.y});
                    document.getElementById('shotList').innerHTML = "CONFIRMED SHOT #" + persistentShots.length + "<br>" + document.getElementById('shotList').innerHTML;
                    candidates = candidates.filter(can => can !== c);
                }
            } else candidates.push({x:h.x, y:h.y, f:1});
        }
        // Decay candidates that don't persist
        candidates = candidates.map(c => ({...c, f: c.f - 0.2})).filter(c => c.f > 0);
    }

    function drawOverlay(H) {
        const ov = document.getElementById('overlayCanvas');
        let ctx = ov.getContext('2d');
        ctx.clearRect(0, 0, ov.width, ov.height);
        persistentShots.forEach((s) => {
            let p = cv.matFromArray(3, 1, cv.CV_64F, [s.x, s.y, 1.0]);
            let dP = new cv.Mat(); cv.gemm(H, p, 1, new cv.Mat(), 0, dP);
            let x = (dP.data64F[0]/dP.data64F[2]) / MATH_SCALE;
            let y = (dP.data64F[1]/dP.data64F[2]) / MATH_SCALE;
            ctx.beginPath(); ctx.arc(x, y, 15, 0, 6.28); ctx.fillStyle = "rgba(0,255,0,0.8)"; ctx.fill();
            p.delete(); dP.delete();
        });
    }

    function toggleTracking() { 
        isTracking = !isTracking;
        const btn = document.getElementById('btnTrack');
        if(isTracking) {
            btn.innerText = "STOP SESSION";
            btn.classList.add('active');
            trackingLoop();
        } else {
            btn.innerText = "START SESSION";
            btn.classList.remove('active');
        }
    }
</script>
</body>
</html>
