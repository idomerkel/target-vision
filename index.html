<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target Hub - Mobile Native Build</title>
    <script>
        var Module = { onRuntimeInitialized: function() { onOpenCvReady(); } };
    </script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #000; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .viewport { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        
        /* Fixed Video Mirroring */
        video#webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas.overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; transform: scaleX(-1); }
        
        .controls { background: #1a1a1a; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; border-top: 1px solid #333; }
        button { padding: 16px; border: none; border-radius: 8px; background: #ff3b30; color: #fff; font-weight: bold; font-size: 13px; }
        button:disabled { background: #333; color: #666; }
        
        #status { background: #00ff00; color: #000; font-size: 11px; padding: 4px; text-align: center; font-weight: bold; }
        #debugCanvas { width: 100px; height: 75px; border: 1px solid #555; position: absolute; bottom: 10px; right: 10px; z-index: 20; background: #000; }
        .sidebar { height: 120px; background: #111; overflow-y: auto; padding: 10px; font-size: 12px; }
        .card { background: #222; padding: 8px; border-left: 3px solid #ff3b30; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="status">INITIALIZING...</div>

<div class="viewport">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlayCanvas" class="overlay"></canvas>
    <canvas id="debugCanvas"></canvas>
</div>

<div class="sidebar" id="shotList">Waiting for session...</div>

<div class="controls">
    <button id="btnBase" onclick="setBaseline()" disabled>1. LOCK TARGET</button>
    <button id="btnTrack" onclick="toggleTracking()" disabled>2. START SESSION</button>
</div>

<canvas id="calcCanvas" style="display:none;"></canvas>

<script>
    let isTracking = false;
    let orb = null, matcher = null, refKP = null, refDesc = null, refGray = null;
    let persistentShots = [], candidates = [], blacklist = [];
    const PROXIMITY = 15.0, REQ_FRAMES = 3; // Lowered frames slightly for mobile speed

    function onOpenCvReady() {
        document.getElementById('status').innerText = "ENGINE READY";
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } } 
        }).then(s => {
            const v = document.getElementById('webcam');
            v.srcObject = s;
            v.onloadedmetadata = () => {
                syncCanvas();
                document.getElementById('btnBase').disabled = false;
                document.getElementById('status').innerText = "CAMERA ACTIVE";
            };
        });
    }

    function syncCanvas() {
        const v = document.getElementById('webcam');
        const ov = document.getElementById('overlayCanvas');
        ov.width = v.videoWidth;
        ov.height = v.videoHeight;
    }

    function grab() {
        const v = document.getElementById('webcam');
        const cvs = document.getElementById('calcCanvas');
        cvs.width = v.videoWidth;
        cvs.height = v.videoHeight;
        const ctx = cvs.getContext('2d');
        // We capture the frame mirrored so it matches the internal math perfectly
        ctx.save();
        ctx.scale(-1, 1);
        ctx.drawImage(v, -cvs.width, 0, cvs.width, cvs.height);
        ctx.restore();
        return cv.imread(cvs);
    }

    function setBaseline() {
        if(!orb) { 
            orb = new cv.ORB(1000); // Throttled to 1000 for mobile CPU
            matcher = new cv.BFMatcher(cv.NORM_HAMMING, true); 
            refKP = new cv.KeyPointVector(); 
            refDesc = new cv.Mat(); 
        }
        let frame = grab();
        let gray = new cv.Mat(), thresh = new cv.Mat();
        cv.cvtColor(frame, gray, cv.COLOR_RGBA2GRAY);
        cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 15, 5);
        
        let contours = new cv.MatVector(), hierarchy = new cv.Mat();
        cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
        
        let best = null, maxA = 0;
        for(let i=0; i<contours.size(); i++) {
            let a = cv.contourArea(contours.get(i));
            if(a > 1200 && a > maxA) { maxA = a; best = cv.minEnclosingCircle(contours.get(i)); }
        }

        if(!best) { alert("Target not seen!"); frame.delete(); gray.delete(); thresh.delete(); return; }

        let radius = Math.round(best.radius);
        let crop = radius * 2 + 40;
        let rect = new cv.Rect(Math.max(0, best.center.x - crop/2), Math.max(0, best.center.y - crop/2), 
                               Math.min(frame.cols - (best.center.x - crop/2), crop), 
                               Math.min(frame.rows - (best.center.y - crop/2), crop));
        
        let roi = frame.roi(rect);
        if(refGray) refGray.delete();
        refGray = new cv.Mat();
        cv.cvtColor(roi, refGray, cv.COLOR_RGBA2GRAY);
        
        let mask = cv.Mat.zeros(roi.rows, roi.cols, cv.CV_8UC1);
        cv.circle(mask, new cv.Point(roi.cols/2, roi.rows/2), radius - 10, new cv.Scalar(255), -1);
        orb.detectAndCompute(refGray, mask, refKP, refDesc);

        document.getElementById('debugCanvas').width = roi.cols;
        document.getElementById('debugCanvas').height = roi.rows;
        document.getElementById('btnTrack').disabled = false;
        document.getElementById('status').innerText = "LOCKED";
        
        frame.delete(); gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete(); mask.delete(); roi.delete();
    }

    function trackingLoop() {
        if(!isTracking) return;
        let frame = grab();
        let grayLive = new cv.Mat(), liveKP = new cv.KeyPointVector(), liveDesc = new cv.Mat(), matches = new cv.DMatchVector();
        
        try {
            cv.cvtColor(frame, grayLive, cv.COLOR_RGBA2GRAY);
            orb.detectAndCompute(grayLive, new cv.Mat(), liveKP, liveDesc);

            if(!liveDesc.empty()) {
                matcher.match(refDesc, liveDesc, matches);
                let good = [];
                for(let i=0; i<matches.size(); i++) { if(matches.get(i).distance < 50) good.push(matches.get(i)); }
                
                if(good.length > 8) {
                    let srcP = [], dstP = [];
                    for(let m of good) { 
                        srcP.push(refKP.get(m.queryIdx).pt.x, refKP.get(m.queryIdx).pt.y); 
                        dstP.push(liveKP.get(m.trainIdx).pt.x, liveKP.get(m.trainIdx).pt.y); 
                    }
                    let matSrc = cv.matFromArray(good.length, 1, cv.CV_32FC2, srcP);
                    let matDst = cv.matFromArray(good.length, 1, cv.CV_32FC2, dstP);
                    let H = cv.findHomography(matSrc, matDst, cv.RANSAC, 5.0);

                    if(!H.empty()) {
                        let invH = new cv.Mat(); cv.invert(H, invH, cv.DECOMP_LU);
                        let warped = new cv.Mat(); cv.warpPerspective(grayLive, warped, invH, new cv.Size(refGray.cols, refGray.rows));
                        
                        let diff = new cv.Mat(), thresh = new cv.Mat();
                        cv.absdiff(refGray, warped, diff);
                        cv.threshold(diff, thresh, 35, 255, cv.THRESH_BINARY);
                        cv.imshow('debugCanvas', thresh);

                        let contours = new cv.MatVector(), hier = new cv.Mat();
                        cv.findContours(thresh, contours, hier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                        
                        let holes = [];
                        for(let i=0; i<contours.size(); i++) {
                            let cnt = contours.get(i), area = cv.contourArea(cnt);
                            if(area > 10 && area < 500) {
                                let M = cv.moments(cnt);
                                let p = {x: M.m10/M.m00, y: M.m01/M.m00};
                                if(blacklist.some(b => Math.hypot(b.x-p.x, b.y-p.y) < PROXIMITY)) continue;
                                let hull = new cv.Mat(); cv.convexHull(cnt, hull);
                                let solidity = area / (cv.contourArea(hull) || 1);
                                hull.delete();
                                if(solidity > 0.85) holes.push(p);
                                else if(solidity < 0.70) blacklist.push(p);
                            }
                        }
                        processShots(holes);
                        drawOverlay(H);
                        
                        invH.delete(); warped.delete(); diff.delete(); thresh.delete(); contours.delete(); hier.delete(); H.delete();
                    }
                    matSrc.delete(); matDst.delete();
                }
            }
        } catch(e) {} finally {
            frame.delete(); grayLive.delete(); liveKP.delete(); liveDesc.delete(); matches.delete();
        }
        requestAnimationFrame(trackingLoop);
    }

    function processShots(holes) {
        for(let h of holes) {
            if(persistentShots.some(s => Math.hypot(s.x-h.x, s.y-h.y) < PROXIMITY)) continue;
            let c = candidates.find(can => Math.hypot(can.x-h.x, can.y-h.y) < PROXIMITY);
            if(c) { 
                c.f++; 
                if(c.f >= REQ_FRAMES) {
                    persistentShots.push({x:h.x, y:h.y});
                    updateList();
                    candidates = candidates.filter(can => can !== c);
                }
            } else candidates.push({x:h.x, y:h.y, f:1});
        }
    }

    function updateList() {
        document.getElementById('shotList').innerHTML = persistentShots.map((s, i) => `
            <div class="card">SHOT #${i+1} DETECTED</div>
        `).reverse().join('');
    }

    function drawOverlay(H) {
        const ov = document.getElementById('overlayCanvas');
        let ctx = ov.getContext('2d');
        ctx.clearRect(0, 0, ov.width, ov.height);
        persistentShots.forEach((s) => {
            let p = cv.matFromArray(3, 1, cv.CV_64F, [s.x, s.y, 1.0]);
            let dP = new cv.Mat(); cv.gemm(H, p, 1, new cv.Mat(), 0, dP);
            let x = dP.data64F[0]/dP.data64F[2], y = dP.data64F[1]/dP.data64F[2];
            ctx.beginPath(); ctx.arc(x,y,12,0,6.28); ctx.fillStyle="rgba(0,255,0,0.8)"; ctx.fill();
            ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.stroke();
            p.delete(); dP.delete();
        });
    }

    function toggleTracking() { isTracking = !isTracking; if(isTracking) { trackingLoop(); document.getElementById('status').innerText = "LIVE"; } }
</script>
</body>
</html>
