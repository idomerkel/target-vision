<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target Analysis - Hardware Locked</title>
    <script>
        var Module = { onRuntimeInitialized: function() { onOpenCvReady(); } };
    </script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0a0a0a; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px; border-right: 2px solid #333; overflow-y: auto; }
        
        /* BOX FORCING 4:3 RATIO */
        .video-box { position: relative; width: 100%; max-width: 640px; aspect-ratio: 4/3; border: 3px solid #444; border-radius: 12px; overflow: hidden; background: #000; flex-shrink: 0; }
        video { position: absolute; width: 100%; height: 100%; top: 0; left: 0; object-fit: fill; transform: scaleX(-1); }
        canvas.overlay { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 10; transform: scaleX(-1); }
        
        .sidebar { width: 350px; background: #161616; padding: 15px; overflow-y: auto; }
        .card { background: #222; border-radius: 8px; padding: 12px; border-left: 4px solid #ff3b30; margin-bottom: 10px; font-size: 13px; }
        button { background: #ff3b30; color: white; border: none; padding: 15px 20px; font-size: 14px; cursor: pointer; border-radius: 8px; font-weight: bold; margin: 5px; }
        #status { font-weight: bold; font-size: 13px; color: #00ff00; margin-bottom: 10px; text-align: center; }
        .debug-view { width: 160px; height: 120px; border: 1px solid #444; background: #000; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="main">
        <h2 style="margin:0 0 5px 0; font-size: 16px;">Precision Vision Engine (Hardware Locked)</h2>
        <p id="status">WASM Loading...</p>
        <div class="video-box" id="vbox">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="overlayCanvas" class="overlay"></canvas>
        </div>
        <div style="margin-top: 10px; display: flex; flex-wrap: wrap; justify-content: center;">
            <button id="btnCam" onclick="startCamera()">Start Camera</button>
            <button id="btnBase" onclick="setBaseline()" disabled>1. Lock Baseline</button>
            <button id="btnTrack" onclick="toggleTracking()" disabled>2. Start Session</button>
        </div>
        <canvas id="debugCanvas" class="debug-view"></canvas>
    </div>

    <div class="sidebar">
        <h3 style="border-bottom: 2px solid #333; padding-bottom: 10px; font-size: 15px;">Target Feedback</h3>
        <div id="shotList"></div>
    </div>

    <canvas id="calcCanvas" style="display:none;"></canvas>

<script>
    let isTracking = false;
    let orb = null, matcher = null, refKP = null, refDesc = null, refGray = null;
    let persistentShots = [], candidates = [];
    const MATH_SCALE = 0.5; // Downsampling for speed
    const PROXIMITY = 20.0; // Distance to merge duplicate shots
    const REQ_FRAMES = 7;   // Requires 7 frames of stability to count a shot

    function onOpenCvReady() {
        document.getElementById('status').innerText = "OpenCV Ready. Tap Start.";
    }

    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 640, height: 480 } })
            .then(s => { 
                const v = document.getElementById('webcam');
                v.srcObject = s; 
                v.onloadedmetadata = () => {
                    const ov = document.getElementById('overlayCanvas');
                    // Lock canvas to ACTUAL hardware resolution
                    ov.width = v.videoWidth;
                    ov.height = v.videoHeight;
                    document.getElementById('btnBase').disabled = false; 
                    document.getElementById('btnCam').style.display = 'none';
                    document.getElementById('status').innerText = "Camera Active (" + v.videoWidth + "x" + v.videoHeight + ")";
                };
            });
    }

    function grab(scaled = false) {
        let cvs = document.getElementById('calcCanvas');
        let ctx = cvs.getContext('2d');
        let v = document.getElementById('webcam');
        let w = scaled ? 320 : 640;
        let h = scaled ? 240 : 480;
        cvs.width = w; cvs.height = h;
        
        // Mirror correction for math logic
        ctx.save();
        ctx.translate(w, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(v, 0, 0, w, h);
        ctx.restore();
        return cv.imread(cvs);
    }

    function setBaseline() {
        if(!orb) { 
            orb = new cv.ORB(1500); 
            matcher = new cv.BFMatcher(cv.NORM_HAMMING, true); 
            refKP = new cv.KeyPointVector(); 
            refDesc = new cv.Mat(); 
        }
        let frame = grab(true);
        let gray = new cv.Mat(), thresh = new cv.Mat();
        cv.cvtColor(frame, gray, cv.COLOR_RGBA2GRAY);
        cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 15, 5);
        let contours = new cv.MatVector(), hierarchy = new cv.Mat();
        cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
        
        let best = null, maxA = 0;
        for(let i=0; i<contours.size(); i++) {
            let a = cv.contourArea(contours.get(i));
            if(a > 800 && a > maxA) { maxA = a; best = cv.minEnclosingCircle(contours.get(i)); }
        }
        if(!best) { alert("Ensure target is large in view."); frame.delete(); gray.delete(); thresh.delete(); return; }

        let radius = Math.round(best.radius);
        let crop = radius * 2 + 40;
        let rect = new cv.Rect(Math.max(0, best.center.x - crop/2), Math.max(0, best.center.y - crop/2), 
                               Math.min(320 - Math.max(0, best.center.x - crop/2), crop), 
                               Math.min(240 - Math.max(0, best.center.y - crop/2), crop));
        
        let roi = frame.roi(rect);
        if(refGray) refGray.delete();
        refGray = new cv.Mat();
        cv.cvtColor(roi, refGray, cv.COLOR_RGBA2GRAY);
        
        let mask = cv.Mat.zeros(roi.rows, roi.cols, cv.CV_8UC1);
        cv.circle(mask, new cv.Point(roi.cols/2, roi.rows/2), radius - 8, new cv.Scalar(255), -1);
        orb.detectAndCompute(refGray, mask, refKP, refDesc);

        document.getElementById('btnTrack').disabled = false;
        document.getElementById('status').innerText = "Target Locked.";
        frame.delete(); gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete(); mask.delete(); roi.delete();
    }

    function trackingLoop() {
        if(!isTracking) return;
        let frame = grab(true);
        let grayLive = new cv.Mat(), liveKP = new cv.KeyPointVector(), liveDesc = new cv.Mat(), matches = new cv.DMatchVector();
        try {
            cv.cvtColor(frame, grayLive, cv.COLOR_RGBA2GRAY);
            orb.detectAndCompute(grayLive, new cv.Mat(), liveKP, liveDesc);
            if(!liveDesc.empty() && !refDesc.empty()) {
                matcher.match(refDesc, liveDesc, matches);
                let good = [];
                for(let i=0; i<matches.size(); i++) { if(matches.get(i).distance < 48) good.push(matches.get(i)); }
                if(good.length > 10) {
                    let srcP = [], dstP = [];
                    for(let m of good) { srcP.push(refKP.get(m.queryIdx).pt.x, refKP.get(m.queryIdx).pt.y); dstP.push(liveKP.get(m.trainIdx).pt.x, liveKP.get(m.trainIdx).pt.y); }
                    let matSrc = cv.matFromArray(good.length, 1, cv.CV_32FC2, srcP), matDst = cv.matFromArray(good.length, 1, cv.CV_32FC2, dstP);
                    let H = cv.findHomography(matSrc, matDst, cv.RANSAC, 5.0);
                    if(!H.empty()) {
                        let invH = new cv.Mat(); cv.invert(H, invH, cv.DECOMP_LU);
                        let warped = new cv.Mat(); cv.warpPerspective(grayLive, warped, invH, new cv.Size(refGray.cols, refGray.rows));
                        
                        let refBlur = new cv.Mat(), warpedBlur = new cv.Mat();
                        cv.GaussianBlur(refGray, refBlur, new cv.Size(3, 3), 0);
                        cv.GaussianBlur(warped, warpedBlur, new cv.Size(3, 3), 0);
                        
                        let diff = new cv.Mat(), thresh = new cv.Mat();
                        cv.absdiff(refBlur, warpedBlur, diff);
                        cv.threshold(diff, thresh, 50, 255, cv.THRESH_BINARY);
                        cv.imshow('debugCanvas', thresh);

                        let contours = new cv.MatVector(), hier = new cv.Mat();
                        cv.findContours(thresh, contours, hier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                        let currentHoles = [];
                        for(let i=0; i<contours.size(); i++) {
                            let cnt = contours.get(i), area = cv.contourArea(cnt);
                            if(area > 4 && area < 100) {
                                let M = cv.moments(cnt);
                                let hull = new cv.Mat(); cv.convexHull(cnt, hull);
                                let solidity = area / (cv.contourArea(hull) || 1);
                                hull.delete();
                                if(solidity > 0.88) currentHoles.push({x: M.m10/M.m00, y: M.m01/M.m00});
                            }
                        }
                        processShots(currentHoles);
                        drawOverlay(H);
                        
                        invH.delete(); warped.delete(); diff.delete(); thresh.delete(); refBlur.delete(); warpedBlur.delete(); contours.delete(); hier.delete(); H.delete();
                    }
                    matSrc.delete(); matDst.delete();
                }
            }
        } catch(e) {} finally { frame.delete(); grayLive.delete(); liveKP.delete(); liveDesc.delete(); matches.delete(); }
        requestAnimationFrame(trackingLoop);
    }

    function processShots(holes) {
        // High-Consensus Filter to stop ghost shots
        for(let h of holes) {
            if(persistentShots.some(s => Math.hypot(s.x-h.x, s.y-h.y) < 10)) continue;
            let c = candidates.find(can => Math.hypot(can.x-h.x, can.y-h.y) < 10);
            if(c) { 
                c.f++; 
                if(c.f >= REQ_FRAMES) {
                    persistentShots.push({id: Date.now(), x:h.x, y:h.y});
                    refreshList();
                    candidates = candidates.filter(can => can !== c);
                }
            } else candidates.push({x:h.x, y:h.y, f:1});
        }
        candidates.forEach(c => { c.f -= 0.1; });
        candidates = candidates.filter(c => c.f > 0);
    }

    function refreshList() {
        const list = document.getElementById('shotList');
        list.innerHTML = persistentShots.slice().reverse().map((s, i) => `
            <div class="card"><h4>Shot #${persistentShots.length-i} Confirmed</h4></div>
        `).join('');
    }

    function drawOverlay(H) {
        const ov = document.getElementById('overlayCanvas');
        const v = document.getElementById('webcam');
        let ctx = ov.getContext('2d');
        ctx.clearRect(0,0,ov.width,ov.height);
        
        persistentShots.forEach((s) => {
            let p = cv.matFromArray(3, 1, cv.CV_64F, [s.x, s.y, 1.0]);
            let dP = new cv.Mat(); cv.gemm(H, p, 1, new cv.Mat(), 0, dP);
            
            // Map 320x240 math pixels back to hardware video width
            let x = (dP.data64F[0]/dP.data64F[2]) * (ov.width / 320);
            let y = (dP.data64F[1]/dP.data64F[2]) * (ov.height / 240);
            
            ctx.beginPath(); ctx.arc(x,y,15,0,6.28); ctx.fillStyle="rgba(0,255,0,0.8)"; ctx.fill();
            ctx.strokeStyle="white"; ctx.lineWidth=3; ctx.stroke();
            p.delete(); dP.delete();
        });
    }

    function toggleTracking() { isTracking = !isTracking; if(isTracking) { document.getElementById('status').innerText = "Session LIVE"; trackingLoop(); } }
</script>
</body>
</html>
