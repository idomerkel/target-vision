<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Precision Target Hub</title>
    <script>
        var Module = { onRuntimeInitialized: function() { 
            document.getElementById('status').innerText = "Engine Online. Tap Start Camera.";
        } };
    </script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .view { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video, canvas.overlay { position: absolute; width: 100%; height: 100%; top: 0; left: 0; object-fit: cover; }
        canvas.overlay { pointer-events: none; z-index: 10; }
        .controls { background: #1a1a1a; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 2px solid #333; }
        button { padding: 18px; border: none; border-radius: 10px; background: #ff3b30; color: #fff; font-weight: bold; font-size: 14px; }
        button:disabled { background: #333; color: #666; }
        .full { grid-column: span 2; }
        #status { background: #111; padding: 8px; font-size: 12px; color: #0f0; text-align: center; font-family: monospace; }
        .sidebar { height: 150px; background: #111; overflow-y: auto; padding: 10px; border-top: 1px solid #444; }
        .card { background: #222; padding: 10px; border-left: 4px solid #0f0; margin-bottom: 8px; font-size: 12px; }
        #debugCanvas { width: 120px; height: 90px; border: 1px solid #444; position: absolute; bottom: 10px; right: 10px; z-index: 20; background: #000; }
    </style>
</head>
<body>

<div id="status">Loading OpenCV...</div>

<div class="view">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlayCanvas" class="overlay"></canvas>
    <canvas id="debugCanvas"></canvas>
</div>

<div class="sidebar">
    <div id="shotList"><p style="color:#555">Waiting for detection...</p></div>
</div>

<div class="controls">
    <button id="btnCam" class="full" onclick="startMobileCamera()">START CAMERA</button>
    <button id="btnBase" onclick="setBaseline()" disabled>1. LOCK TARGET</button>
    <button id="btnTrack" onclick="toggleTracking()" disabled>2. START SESSION</button>
</div>

<canvas id="calcCanvas" style="display:none;"></canvas>

<script>
    let isTracking = false;
    let orb = null, matcher = null, refKP = null, refDesc = null, refGray = null;
    let persistentShots = [], candidates = [], blacklist = [];
    const PROXIMITY = 15.0, REQ_FRAMES = 4;

    async function startMobileCamera() {
        const constraints = {
            video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } }
        };
        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            const video = document.getElementById('webcam');
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                const ov = document.getElementById('overlayCanvas');
                ov.width = video.videoWidth; ov.height = video.videoHeight;
                document.getElementById('btnBase').disabled = false;
                document.getElementById('btnCam').style.display = 'none';
                document.getElementById('status').innerText = "Camera Active. Align Target.";
            };
        } catch (e) {
            document.getElementById('status').innerText = "Error: " + e.message;
        }
    }

    function grab() {
        let cvs = document.getElementById('calcCanvas');
        let video = document.getElementById('webcam');
        cvs.width = video.videoWidth; cvs.height = video.videoHeight;
        cvs.getContext('2d').drawImage(video, 0, 0);
        return cv.imread(cvs);
    }

    function setBaseline() {
        if(!orb) { 
            orb = new cv.ORB(1500); matcher = new cv.BFMatcher(cv.NORM_HAMMING, true); 
            refKP = new cv.KeyPointVector(); refDesc = new cv.Mat(); 
        }
        let frame = grab();
        let gray = new cv.Mat(), thresh = new cv.Mat();
        cv.cvtColor(frame, gray, cv.COLOR_RGBA2GRAY);
        cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 15, 5);
        let contours = new cv.MatVector(), hierarchy = new cv.Mat();
        cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
        
        let best = null, maxA = 0;
        for(let i=0; i<contours.size(); i++) {
            let a = cv.contourArea(contours.get(i));
            if(a > 2000 && a > maxA) { maxA = a; best = cv.minEnclosingCircle(contours.get(i)); }
        }

        if(!best) { alert("Target not detected!"); frame.delete(); gray.delete(); thresh.delete(); return; }

        let radius = Math.round(best.radius);
        let crop = radius * 2 + 60;
        let rect = new cv.Rect(Math.max(0, best.center.x - crop/2), Math.max(0, best.center.y - crop/2), 
                               Math.min(frame.cols - (best.center.x - crop/2), crop), 
                               Math.min(frame.rows - (best.center.y - crop/2), crop));
        
        let roi = frame.roi(rect);
        if(refGray) refGray.delete();
        refGray = new cv.Mat();
        cv.cvtColor(roi, refGray, cv.COLOR_RGBA2GRAY);
        
        let mask = cv.Mat.zeros(roi.rows, roi.cols, cv.CV_8UC1);
        cv.circle(mask, new cv.Point(roi.cols/2, roi.rows/2), radius - 10, new cv.Scalar(255), -1);
        orb.detectAndCompute(refGray, mask, refKP, refDesc);

        document.getElementById('btnTrack').disabled = false;
        document.getElementById('status').innerText = "Baseline Locked. Press Start Session.";
        frame.delete(); gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete(); mask.delete(); roi.delete();
    }

    function trackingLoop() {
        if(!isTracking) return;
        let frame = grab();
        let grayLive = new cv.Mat(), liveKP = new cv.KeyPointVector(), liveDesc = new cv.Mat(), matches = new cv.DMatchVector();
        
        try {
            cv.cvtColor(frame, grayLive, cv.COLOR_RGBA2GRAY);
            orb.detectAndCompute(grayLive, new cv.Mat(), liveKP, liveDesc);

            if(!liveDesc.empty()) {
                matcher.match(refDesc, liveDesc, matches);
                let good = [];
                for(let i=0; i<matches.size(); i++) { if(matches.get(i).distance < 48) good.push(matches.get(i)); }
                
                if(good.length > 10) {
                    let srcP = [], dstP = [];
                    for(let m of good) { 
                        srcP.push(refKP.get(m.queryIdx).pt.x, refKP.get(m.queryIdx).pt.y); 
                        dstP.push(liveKP.get(m.trainIdx).pt.x, liveKP.get(m.trainIdx).pt.y); 
                    }
                    let matSrc = cv.matFromArray(good.length, 1, cv.CV_32FC2, srcP);
                    let matDst = cv.matFromArray(good.length, 1, cv.CV_32FC2, dstP);
                    let H = cv.findHomography(matSrc, matDst, cv.RANSAC, 5.0);

                    if(!H.empty()) {
                        let invH = new cv.Mat(); cv.invert(H, invH, cv.DECOMP_LU);
                        let warped = new cv.Mat(); cv.warpPerspective(grayLive, warped, invH, new cv.Size(refGray.cols, refGray.rows));
                        
                        let refBlur = new cv.Mat(), warpedBlur = new cv.Mat();
                        cv.GaussianBlur(refGray, refBlur, new cv.Size(3,3), 0);
                        cv.GaussianBlur(warped, warpedBlur, new cv.Size(3,3), 0);

                        let diff = new cv.Mat(), thresh = new cv.Mat();
                        cv.absdiff(refBlur, warpedBlur, diff);
                        cv.threshold(diff, thresh, 40, 255, cv.THRESH_BINARY);
                        cv.imshow('debugCanvas', thresh);

                        let contours = new cv.MatVector(), hier = new cv.Mat();
                        cv.findContours(thresh, contours, hier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                        
                        let currentHoles = [];
                        for(let i=0; i<contours.size(); i++) {
                            let cnt = contours.get(i), area = cv.contourArea(cnt);
                            if(area > 12 && area < 600) {
                                let M = cv.moments(cnt);
                                let p = {x: M.m10/M.m00, y: M.m01/M.m00};
                                if(blacklist.some(b => Math.hypot(b.x-p.x, b.y-p.y) < PROXIMITY)) continue;
                                let hull = new cv.Mat(); cv.convexHull(cnt, hull);
                                let solidity = area / (cv.contourArea(hull) || 1);
                                hull.delete();
                                if(solidity > 0.86) currentHoles.push(p);
                                else if(solidity < 0.75) blacklist.push(p);
                            }
                        }
                        processShots(currentHoles);
                        drawOverlay(H);
                        
                        invH.delete(); warped.delete(); diff.delete(); thresh.delete(); 
                        refBlur.delete(); warpedBlur.delete(); contours.delete(); hier.delete(); H.delete();
                    }
                    matSrc.delete(); matDst.delete();
                }
            }
        } catch(e) { console.error(e); } finally {
            frame.delete(); grayLive.delete(); liveKP.delete(); liveDesc.delete(); matches.delete();
        }
        requestAnimationFrame(trackingLoop);
    }

    function processShots(holes) {
        for(let h of holes) {
            if(persistentShots.some(s => Math.hypot(s.x-h.x, s.y-h.y) < PROXIMITY)) continue;
            let c = candidates.find(can => Math.hypot(can.x-h.x, can.y-h.y) < PROXIMITY);
            if(c) { 
                c.f++; 
                if(c.f >= REQ_FRAMES) {
                    persistentShots.push({id: Date.now(), x:h.x, y:h.y});
                    refreshList();
                    candidates = candidates.filter(can => can !== c);
                }
            } else candidates.push({x:h.x, y:h.y, f:1});
        }
    }

    function refreshList() {
        const list = document.getElementById('shotList');
        list.innerHTML = persistentShots.slice().reverse().map((s, i) => `
            <div class="card"><h4>Shot #${persistentShots.length-i}</h4></div>
        `).join('');
    }

    function drawOverlay(H) {
        let ctx = document.getElementById('overlayCanvas').getContext('2d');
        ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
        persistentShots.forEach((s) => {
            let p = cv.matFromArray(3, 1, cv.CV_64F, [s.x, s.y, 1.0]);
            let dP = new cv.Mat(); cv.gemm(H, p, 1, new cv.Mat(), 0, dP);
            let x = dP.data64F[0]/dP.data64F[2], y = dP.data64F[1]/dP.data64F[2];
            ctx.beginPath(); ctx.arc(x,y,12,0,6.28); ctx.fillStyle="rgba(0,255,0,0.7)"; ctx.fill();
            ctx.strokeStyle="white"; ctx.stroke();
            p.delete(); dP.delete();
        });
    }

    function toggleTracking() { isTracking = !isTracking; if(isTracking) { trackingLoop(); document.getElementById('status').innerText = "Session Active."; } }
</script>
</body>
</html>
